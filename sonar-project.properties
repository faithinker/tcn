# Required metadata
sonar.projectKey=faithinker_tcn
sonar.organization=faithinker

# Path to sources and tests
sonar.sources=src,functions
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude compiled output, third-party libraries, and non-code directories
sonar.exclusions=node_modules/**,dist/**,verify/**,scripts/**,coverage/**,.astro/**,public/**,**/*.config.*

# Code coverage reports path (used when CI-based analysis is enabled)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
